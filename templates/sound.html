<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>入口音量モニタ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <style>
    .status-badge {
      font-size: 1.8rem;
      padding: 0.4rem 1.4rem;
      border-radius: 999px;
    }
    .log-table-wrap {
      max-height: 70vh;
      overflow-y: auto;
    }
    @media (max-width: 767.98px) {
      .status-badge {
        font-size: 1.4rem;
      }
      .log-table-wrap {
        max-height: 40vh;
      }
    }
  </style>
</head>
<body class="p-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">入口付近のにぎやか度</h3>
    <a href="/" class="btn btn-outline-secondary btn-sm">カレンダーへ戻る</a>
  </div>

  <div class="row g-3">
    <!-- 左：リアルタイム状態 -->
    <div class="col-md-4">
      <div class="mb-3">
        <span id="status" class="badge bg-secondary status-badge">--</span>
      </div>
      <p class="mb-1">
        音量レベル: <span id="level">--</span>
      </p>
      <p class="mb-1">
        最終更新時刻: <span id="time">--</span>
      </p>
    </div>

    <!-- 右：ログ一覧 ＋ フィルタ -->
    <div class="col-md-8">
      <div class="card">
        <div class="card-header py-2">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <span class="fw-bold">ログ一覧</span>
            </div>
            <div class="col-auto">
              <label class="form-label mb-0 small">日付</label>
              <input type="date" id="filterDate" class="form-control form-control-sm">
            </div>
            <div class="col-auto">
              <label class="form-label mb-0 small">開始時刻</label>
              <input type="time" id="filterFrom" class="form-control form-control-sm">
            </div>
            <div class="col-auto">
              <label class="form-label mb-0 small">終了時刻</label>
              <input type="time" id="filterTo" class="form-control form-control-sm">
            </div>
            <div class="col-auto">
              <button id="applyFilter" class="btn btn-sm btn-outline-primary">
                絞り込み（DB検索）
              </button>
            </div>
            <div class="col-auto">
              <button id="clearFilter" class="btn btn-sm btn-outline-secondary">
                直近100件に戻す
              </button>
            </div>
          </div>
        </div>
        <div class="card-body p-2 log-table-wrap">
          <table class="table table-sm table-striped mb-0">
            <thead>
              <tr>
                <th style="width: 40%;">時刻</th>
                <th style="width: 30%;">状態</th>
                <th style="width: 30%;">レベル</th>
              </tr>
            </thead>
            <tbody id="logBody">
              <tr><td colspan="3">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== 左側：現在の状態 =====
    function updateView(data) {
      const statusEl = document.getElementById("status");
      const levelEl  = document.getElementById("level");
      const timeEl   = document.getElementById("time");

      const status = data.status || "--";

      statusEl.textContent = status;
      levelEl.textContent  = data.level ?? "--";
      timeEl.textContent   = data.time || "--";

      // 色分け
      statusEl.className = "badge status-badge ";
      if (status === "無人") {
        statusEl.className += "bg-secondary";
      } else if (status === "多分いる") {
        statusEl.className += "bg-info text-dark";
      } else if (status === "確実にいる") {
        statusEl.className += "bg-warning text-dark";
      } else if (status === "大勢いる") {
        statusEl.className += "bg-danger";
      } else {
        statusEl.className += "bg-secondary";
      }
    }

    async function fetchSoundStatus() {
      try {
        const res = await fetch("/api/sound_status_latest");
        if (!res.ok) return;
        const data = await res.json();
        updateView(data);
      } catch (e) {
        console.error(e);
      }
    }

    // ===== 右側：ログ表示 =====
    let allLogs = [];  // 直近100件

    async function loadLogs(limit = 100) {
      const tbody = document.getElementById("logBody");
      tbody.innerHTML = '<tr><td colspan="3">読み込み中...</td></tr>';

      try {
        const res = await fetch(`/api/sound_logs_recent?limit=${limit}`);
        if (!res.ok) {
          tbody.innerHTML = '<tr><td colspan="3">読み込みに失敗しました</td></tr>';
          return;
        }
        const rows = await res.json();
        allLogs = rows;
        renderLogs(rows);
      } catch (e) {
        console.error(e);
        tbody.innerHTML = '<tr><td colspan="3">エラーが発生しました</td></tr>';
      }
    }

    function renderLogs(rows) {
      const tbody = document.getElementById("logBody");
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="3">該当データがありません</td></tr>';
        return;
      }

      tbody.innerHTML = "";
      for (const r of rows) {
        const tr = document.createElement("tr");

        const tdTs = document.createElement("td");
        tdTs.textContent = r.ts;

        const tdStatus = document.createElement("td");
        tdStatus.textContent = r.status;

        const tdLevel = document.createElement("td");
        tdLevel.textContent = r.level;

        tr.appendChild(tdTs);
        tr.appendChild(tdStatus);
        tr.appendChild(tdLevel);
        tbody.appendChild(tr);
      }
    }

    // ★ DB 検索で過去の任意時間帯を取得
    async function applyFilter() {
      const dateVal = document.getElementById("filterDate").value;  // YYYY-MM-DD
      const fromVal = document.getElementById("filterFrom").value;  // HH:MM
      const toVal   = document.getElementById("filterTo").value;    // HH:MM

      const params = new URLSearchParams();
      if (dateVal) params.append("date", dateVal);
      if (fromVal) params.append("from", fromVal);
      if (toVal)   params.append("to", toVal);
      params.append("limit", 500);  // その範囲で最大500件

      const tbody = document.getElementById("logBody");
      tbody.innerHTML = '<tr><td colspan="3">読み込み中...</td></tr>';

      try {
        const res = await fetch("/api/sound_logs_query?" + params.toString());
        if (!res.ok) {
          tbody.innerHTML = '<tr><td colspan="3">読み込みに失敗しました</td></tr>';
          return;
        }
        const rows = await res.json();
        renderLogs(rows);
      } catch (e) {
        console.error(e);
        tbody.innerHTML = '<tr><td colspan="3">エラーが発生しました</td></tr>';
      }
    }

    function clearFilter() {
      document.getElementById("filterDate").value = "";
      document.getElementById("filterFrom").value = "";
      document.getElementById("filterTo").value = "";
      renderLogs(allLogs);  // 直近100件に戻す
    }

    document.addEventListener("DOMContentLoaded", () => {
      // 左：1秒ごとに現在状態を更新
      fetchSoundStatus();
      setInterval(fetchSoundStatus, 1000);

      // 右：初回に直近100件をロード
      loadLogs(100);

      document.getElementById("applyFilter").addEventListener("click", applyFilter);
      document.getElementById("clearFilter").addEventListener("click", clearFilter);
    });
  </script>
</body>
</html>
